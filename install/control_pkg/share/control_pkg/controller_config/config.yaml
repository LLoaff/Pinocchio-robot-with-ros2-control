controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    pos_controller:
      type: joint_trajectory_controller/JointTrajectoryController

pos_controller:  
  ros__parameters:
    joints:
    - fr_hip_joint
    - fr_knee_joint
    - fr_thigh_joint
    - fl_hip_joint
    - fl_knee_joint
    - fl_thigh_joint
    - br_hip_joint
    - br_knee_joint
    - br_thigh_joint
    - bl_hip_joint
    - bl_knee_joint
    - bl_thigh_joint
    command_interfaces: 
    - position
    # - velocity
    # - effort
    state_interfaces:
    - position
    - velocity
    allow_partial_joints_goal: true
    hold_joints: true