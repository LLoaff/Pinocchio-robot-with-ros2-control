controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    pos_controller:
      type: forward_command_controller/ForwardCommandController


pos_controller:  
  ros__parameters:
    joints:
    - fr_hip_joint
    - fr_knee_joint
    - fr_thigh_joint
    - fl_hip_joint
    - fl_knee_joint
    - fl_thigh_joint
    - br_hip_joint
    - br_knee_joint
    - br_thigh_joint
    - bl_hip_joint
    - bl_knee_joint
    - bl_thigh_joint
    interface_name: position